name: Publish wgpu4k-native

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 25
          cache: 'gradle'
      - name: Build and publish with Gradle
        run: |
          if [[ -z "$VERSION" || "$VERSION" == *-SNAPSHOT ]]; then
            echo "::error title=Invalid release VERSION::VERSION must be non-empty and must not end with -SNAPSHOT."
            exit 1
          fi
          ./gradlew fetch-native-dependencies assemble build publishToMavenCentral \
            -x :kextract:test \
            --info
        env:
          VERSION: ${{ github.event.release.tag_name }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_LOGIN }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.PGP_PRIVATE }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.PGP_PASSPHRASE }}
