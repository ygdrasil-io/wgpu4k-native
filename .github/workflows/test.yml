name: Tests

on:
  push:
    branches: [ main, 'release/**', 'feature/**', 'fix/**']
  pull_request:
    branches: [ main, 'release/**', 'feature/**', 'fix/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, ubuntu-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: install dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y libglfw3-dev
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 25
          cache: 'gradle'
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle
      - name: Publish JVM verification artifacts
        if: matrix.os == 'ubuntu-latest'
        run: >-
          ./gradlew -Pwgpu4k.jvmVerificationPublication=true
          :kffi:publishJvmPublicationToMavenLocal
          :wgpu4k-native:publishJvmPublicationToMavenLocal
      - name: Verify published JVM consumer
        if: matrix.os == 'ubuntu-latest'
        working-directory: gradle/jvm-bootstrap-consumer
        run: ../../gradlew --refresh-dependencies clean run --stacktrace
      - name: Run complete kextract tests
        shell: bash
        run: |
          rm -rf kextract/build/test-results/test
          rm -f kextract/build/test-plan-completion/test.properties
          ./gradlew :kextract:test
      - name: Run targeted JVM callback tests
        run: ./gradlew :kffi:jvmTest :wgpu4k-native:jvmTest :demo:common:jvmTest
      - name: Prepare macOS Native dependencies
        if: matrix.os == 'macos-latest'
        run: >-
          ./gradlew
          :wgpu4k-native:unzip-webgpu.h-from-wgpu-macos-aarch64-release.zip
          :wgpu4k-native:unzip-wgpu.h-from-wgpu-macos-aarch64-release.zip
          :wgpu4k-native:unzip-libwgpu_native.a-from-wgpu-macos-aarch64-release.zip
          :wgpu4k-native:unzip-libwgpu_native.a-from-wgpu-macos-x86_64-release.zip
          :wgpu4k-native:unzip-libwgpu_native.a-from-wgpu-ios-x86_64-simulator-release.zip
          :wgpu4k-native:unzip-libwgpu_native.a-from-wgpu-ios-aarch64-release.zip
          :wgpu4k-native:unzip-libwgpu_native.a-from-wgpu-ios-aarch64-simulator-release.zip
      - name: Prepare Linux Native dependencies
        if: matrix.os == 'ubuntu-latest'
        run: >-
          ./gradlew
          :wgpu4k-native:unzip-webgpu.h-from-wgpu-macos-aarch64-release.zip
          :wgpu4k-native:unzip-wgpu.h-from-wgpu-macos-aarch64-release.zip
          :wgpu4k-native:unzip-libwgpu_native.a-from-wgpu-linux-x86_64-release.zip
          :wgpu4k-native:unzip-libwgpu_native.a-from-wgpu-linux-aarch64-release.zip
      - name: Prepare MinGW Native dependencies
        if: matrix.os == 'windows-latest'
        run: >-
          ./gradlew
          :wgpu4k-native:unzip-webgpu.h-from-wgpu-macos-aarch64-release.zip
          :wgpu4k-native:unzip-wgpu.h-from-wgpu-macos-aarch64-release.zip
          :wgpu4k-native:unzip-libwgpu_native.a-from-wgpu-windows-x86_64-gnu-release.zip
      - name: Verify JVM callback stress
        run: ./gradlew :demo:desktop-and-ios:verifyJvmCallbackStress
      - name: Verify Native callback stress
        run: >-
          ./gradlew :demo:desktop-and-ios:verifyNativeCallbackStress
          -x :wgpu4k-native:fetch-native-dependencies
      - name: Verify JVM headless render
        run: ./gradlew :demo:desktop-and-ios:verifyJvmHeadlessRender
      - name: Verify Native headless render
        run: >-
          ./gradlew :demo:desktop-and-ios:verifyNativeHeadlessRender
          -x :wgpu4k-native:fetch-native-dependencies
      - name: Compile Apple Native callback token codecs
        if: matrix.os == 'macos-latest'
        run: >-
          ./gradlew
          :kffi:compileKotlinIosX64 :kffi:compileKotlinIosArm64 :kffi:compileKotlinIosSimulatorArm64
          :kffi:compileKotlinMacosArm64 :kffi:compileKotlinMacosX64
          :wgpu4k-native:compileKotlinIosX64 :wgpu4k-native:compileKotlinIosArm64
          :wgpu4k-native:compileKotlinIosSimulatorArm64
          :wgpu4k-native:compileKotlinMacosArm64 :wgpu4k-native:compileKotlinMacosX64
          -x :wgpu4k-native:fetch-native-dependencies
      - name: Compile Linux Native callback token codecs
        if: matrix.os == 'ubuntu-latest'
        run: >-
          ./gradlew
          :kffi:compileKotlinLinuxX64 :kffi:compileKotlinLinuxArm64
          :wgpu4k-native:compileKotlinLinuxX64 :wgpu4k-native:compileKotlinLinuxArm64
          -x :wgpu4k-native:fetch-native-dependencies
      - name: Compile MinGW callback token codecs
        if: matrix.os == 'windows-latest'
        run: >-
          ./gradlew
          :kffi:compileKotlinMingwX64
          :wgpu4k-native:compileKotlinMingwX64
          -x :wgpu4k-native:fetch-native-dependencies
      - name: Run macOS Native tests
        if: matrix.os == 'macos-latest'
        run: |
          if [[ "$(uname -m)" == "arm64" ]]; then
            ./gradlew :kffi:macosArm64Test :wgpu4k-native:macosArm64Test -x :wgpu4k-native:fetch-native-dependencies
          else
            ./gradlew :kffi:macosX64Test :wgpu4k-native:macosX64Test -x :wgpu4k-native:fetch-native-dependencies
          fi
      - name: Run Linux Native tests
        if: matrix.os == 'ubuntu-latest'
        run: >-
          ./gradlew :kffi:linuxX64Test :wgpu4k-native:linuxX64Test
          -x :wgpu4k-native:fetch-native-dependencies
      - name: Run Windows Native tests
        if: matrix.os == 'windows-latest'
        run: >-
          ./gradlew :kffi:mingwX64Test :wgpu4k-native:mingwX64Test
          -x :wgpu4k-native:fetch-native-dependencies
      - name: Verify binding-generation configuration
        run: ./gradlew :wgpu4k-native:verifyBindingGenerationConfiguration
      - name: Regenerate and verify WebGPU bindings
        if: matrix.os == 'macos-latest'
        run: >-
          ./gradlew
          :wgpu4k-native:generateBindingsFromHeader
          :wgpu4k-native:verifyGeneratedBindingsClean
