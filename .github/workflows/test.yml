name: Tests

on:
  push:
    branches: [ main, 'release/**', 'feature/**', 'fix/**']
  pull_request:
    branches: [ main, 'release/**', 'feature/**', 'fix/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, ubuntu-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: install dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y libglfw3-dev
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 25
          cache: 'gradle'
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle
      - name: Build
        run: |
          ./gradlew fetch-native-dependencies
          ./gradlew build -x :kextract:test -x :demo:common:testDebugUnitTest
      - name: Verify published JVM consumer
        if: matrix.os == 'ubuntu-latest'
        run: ./gradlew verifyPublishedConsumer --stacktrace
      - name: Run complete kextract tests
        shell: bash
        run: |
          rm -rf kextract/build/test-results/test
          rm -f kextract/build/test-plan-completion/test.properties
          set +e
          ./gradlew :kextract:test
          GRADLE_EXIT=$?
          if [ "$GRADLE_EXIT" -eq 0 ]; then
            exit 0
          fi
          if [ "$RUNNER_OS" != "Linux" ] || { [ "$GRADLE_EXIT" -ne 134 ] && [ "$GRADLE_EXIT" -ne 139 ]; }; then
            exit "$GRADLE_EXIT"
          fi
          MARKER=kextract/build/test-plan-completion/test.properties
          if [ ! -f "$MARKER" ]; then
            exit "$GRADLE_EXIT"
          fi
          ruby <<'RUBY'
          require "rexml/document"

          directory = "kextract/build/test-results/test"
          marker = File.read("kextract/build/test-plan-completion/test.properties")
          marker_match = marker.match(/^tests=(\d+)$/)
          abort "Invalid kextract completion marker" unless marker_match
          expected_tests = Integer(marker_match[1])
          reports = Dir[File.join(directory, "TEST-*.xml")]
          abort "No kextract XML test reports found" if reports.empty?

          actual_tests = reports.sum do |path|
            suite = REXML::Document.new(File.read(path)).root
            abort "Invalid test report: #{path}" unless suite&.name == "testsuite"
            failures = Integer(suite.attributes["failures"])
            errors = Integer(suite.attributes["errors"])
            abort "Failed kextract test report: #{path}" unless failures.zero? && errors.zero?
            Integer(suite.attributes["tests"])
          end
          abort "Incomplete kextract reports: expected #{expected_tests} tests, found #{actual_tests}" unless actual_tests == expected_tests
          RUBY
          XML_EXIT=$?
          if [ "$XML_EXIT" -ne 0 ]; then
            exit "$GRADLE_EXIT"
          fi
          echo "::warning::Gradle exited $GRADLE_EXIT after the complete clean kextract test plan — accepting the known libclang/JDK 25 shutdown SIGSEGV."
      - name: Run targeted JVM callback tests
        run: ./gradlew :kffi:jvmTest :wgpu4k-native:jvmTest :demo:common:jvmTest
      - name: Verify JVM callback stress
        run: ./gradlew :demo:desktop-and-ios:verifyJvmCallbackStress
      - name: Verify Native callback stress
        run: ./gradlew :demo:desktop-and-ios:verifyNativeCallbackStress
      - name: Verify JVM headless render
        run: ./gradlew :demo:desktop-and-ios:verifyJvmHeadlessRender
      - name: Verify Native headless render
        run: ./gradlew :demo:desktop-and-ios:verifyNativeHeadlessRender
      - name: Compile Apple Native callback token codecs
        if: matrix.os == 'macos-latest'
        run: >-
          ./gradlew
          :kffi:compileKotlinIosX64 :kffi:compileKotlinIosArm64 :kffi:compileKotlinIosSimulatorArm64
          :kffi:compileKotlinMacosArm64 :kffi:compileKotlinMacosX64
          :wgpu4k-native:compileKotlinIosX64 :wgpu4k-native:compileKotlinIosArm64
          :wgpu4k-native:compileKotlinIosSimulatorArm64
          :wgpu4k-native:compileKotlinMacosArm64 :wgpu4k-native:compileKotlinMacosX64
      - name: Compile Linux and Android Native callback token codecs
        if: matrix.os == 'ubuntu-latest'
        run: >-
          ./gradlew
          :kffi:compileKotlinLinuxX64 :kffi:compileKotlinLinuxArm64
          :kffi:compileKotlinAndroidNativeArm64 :kffi:compileKotlinAndroidNativeX64
          :wgpu4k-native:compileKotlinLinuxX64 :wgpu4k-native:compileKotlinLinuxArm64
          :wgpu4k-native:compileKotlinAndroidNativeArm64 :wgpu4k-native:compileKotlinAndroidNativeX64
      - name: Compile MinGW callback token codecs
        if: matrix.os == 'windows-latest'
        run: >-
          ./gradlew
          :kffi:compileKotlinMingwX64
          :wgpu4k-native:compileKotlinMingwX64
      - name: Run macOS Native tests
        if: matrix.os == 'macos-latest'
        run: |
          if [[ "$(uname -m)" == "arm64" ]]; then
            ./gradlew :kffi:macosArm64Test :wgpu4k-native:macosArm64Test
          else
            ./gradlew :kffi:macosX64Test :wgpu4k-native:macosX64Test
          fi
      - name: Run Linux Native tests
        if: matrix.os == 'ubuntu-latest'
        run: ./gradlew :kffi:linuxX64Test :wgpu4k-native:linuxX64Test
      - name: Run Windows Native tests
        if: matrix.os == 'windows-latest'
        run: ./gradlew :kffi:mingwX64Test :wgpu4k-native:mingwX64Test
      - name: Verify binding-generation configuration
        run: ./gradlew :wgpu4k-native:verifyBindingGenerationConfiguration
      - name: Regenerate and verify WebGPU bindings
        if: matrix.os == 'macos-latest'
        run: >-
          ./gradlew
          :wgpu4k-native:generateBindingsFromHeader
          :wgpu4k-native:verifyGeneratedBindingsClean
