name: Publish wgpu4k snapshot

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'version to publish'
        required: false
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 25
      - name: Build and publish with Gradle
        run: |
          if [[ -n "$VERSION" && "$VERSION" != *-SNAPSHOT ]]; then
            echo "::error title=Invalid snapshot VERSION::VERSION must be empty or end exactly with -SNAPSHOT."
            exit 1
          fi
          ./gradlew fetch-native-dependencies assemble build publishToMavenCentral \
            -x :kextract:test \
            -x :demo:common:testDebugUnitTest \
            --info
        env:
          VERSION: ${{ github.event.inputs.version }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_LOGIN }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.PGP_PRIVATE }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.PGP_PASSPHRASE }}
