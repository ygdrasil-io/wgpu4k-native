name: webgpu
enum_prefix: '0x0000'
enums:
  # === Log Levels ===
  - name: LogLevel
    doc: |
      Log levels for wgpu-native logging.
    entries:
      - name: Off
        value: 0x00000000
      - name: Error
        value: 0x00000001
      - name: Warn
        value: 0x00000002
      - name: Info
        value: 0x00000003
      - name: Debug
        value: 0x00000004
      - name: Trace
        value: 0x00000005

  # === Native STypes ===
  - name: NativeSType
    doc: |
      Native structure type identifiers for wgpu-native extensions.
    entries:
      - name: DeviceExtras
        value: 0x00030001
      - name: NativeLimits
        value: 0x00030002
      - name: PipelineLayoutExtras
        value: 0x00030003
      - name: ShaderSourceGLSL
        value: 0x00030004
      - name: InstanceExtras
        value: 0x00030006
      - name: BindGroupEntryExtras
        value: 0x00030007
      - name: BindGroupLayoutEntryExtras
        value: 0x00030008
      - name: QuerySetDescriptorExtras
        value: 0x00030009
      - name: SurfaceConfigurationExtras
        value: 0x0003000A
      - name: SurfaceSourceSwapChainPanel
        value: 0x0003000B
      - name: PrimitiveStateExtras
        value: 0x0003000C

  # === Surface Status ===
  - name: NativeSurfaceGetCurrentTextureStatus
    doc: |
      Additional surface-get-current-texture status codes defined by wgpu-native.
    entries:
      - name: Occluded
        value: 0x00030001

  # === Native Features ===
  - name: NativeFeature
    doc: |
      Native-only device features that extend standard WebGPU features.
    entries:
      - name: Immediates
        value: 0x00030001
      - name: TextureAdapterSpecificFormatFeatures
        value: 0x00030002
      - name: MultiDrawIndirectCount
        value: 0x00030004
      - name: VertexWritableStorage
        value: 0x00030005
      - name: TextureBindingArray
        value: 0x00030006
      - name: SampledTextureAndStorageBufferArrayNonUniformIndexing
        value: 0x00030007
      - name: PipelineStatisticsQuery
        value: 0x00030008
      - name: StorageResourceBindingArray
        value: 0x00030009
      - name: PartiallyBoundBindingArray
        value: 0x0003000A
      - name: TextureFormat16bitNorm
        value: 0x0003000B
      - name: TextureCompressionAstcHdr
        value: 0x0003000C
      - name: MappablePrimaryBuffers
        value: 0x0003000E
      - name: BufferBindingArray
        value: 0x0003000F
      - name: UniformBufferAndStorageTextureArrayNonUniformIndexing
        value: 0x00030010
      - name: PolygonModeLine
        value: 0x00030013
      - name: PolygonModePoint
        value: 0x00030014
      - name: ConservativeRasterization
        value: 0x00030015
      - name: SpirvShaderPassthrough
        value: 0x00030017
      - name: VertexAttribute64bit
        value: 0x00030019
      - name: TextureFormatNv12
        value: 0x0003001A
      - name: RayQuery
        value: 0x0003001C
      - name: ShaderF64
        value: 0x0003001D
      - name: ShaderI16
        value: 0x0003001E
      - name: ShaderEarlyDepthTest
        value: 0x00030020
      - name: Subgroup
        value: 0x00030021
      - name: SubgroupVertex
        value: 0x00030022
      - name: SubgroupBarrier
        value: 0x00030023
      - name: TimestampQueryInsideEncoders
        value: 0x00030024
      - name: TimestampQueryInsidePasses
        value: 0x00030025
      - name: ShaderInt64
        value: 0x00030026

  # === Compiler & Version Enums ===
  - name: Dx12Compiler
    entries:
      - name: Undefined
        value: 0x00000000
      - name: Fxc
        value: 0x00000001
      - name: Dxc
        value: 0x00000002

  - name: Gles3MinorVersion
    entries:
      - name: Automatic
        value: 0x00000000
      - name: Version0
        value: 0x00000001
      - name: Version1
        value: 0x00000002
      - name: Version2
        value: 0x00000003

  - name: DxcMaxShaderModel
    entries:
      - name: V6_0
        value: 0x00000000
      - name: V6_1
        value: 0x00000001
      - name: V6_2
        value: 0x00000002
      - name: V6_3
        value: 0x00000003
      - name: V6_4
        value: 0x00000004
      - name: V6_5
        value: 0x00000005
      - name: V6_6
        value: 0x00000006
      - name: V6_7
        value: 0x00000007

  - name: GLFenceBehaviour
    entries:
      - name: Normal
        value: 0x00000000
      - name: AutoFinish
        value: 0x00000001

  - name: PipelineStatisticName
    entries:
      - name: VertexShaderInvocations
        value: 0x00000000
      - name: ClipperInvocations
        value: 0x00000001
      - name: ClipperPrimitivesOut
        value: 0x00000002
      - name: FragmentShaderInvocations
        value: 0x00000003
      - name: ComputeShaderInvocations
        value: 0x00000004

  - name: NativeQueryType
    entries:
      - name: PipelineStatistics
        value: 0x00030000

  - name: Dx12SwapchainKind
    entries:
      - name: Undefined
        value: 0x00000000
      - name: DxgiFromHwnd
        value: 0x00000001
      - name: DxgiFromVisual
        value: 0x00000002

  - name: NativeDisplayHandleType
    entries:
      - name: None
        value: 0x00000000
      - name: Xlib
        value: 0x00000001
      - name: Xcb
        value: 0x00000002
      - name: Wayland
        value: 0x00000003

  - name: PolygonMode
    entries:
      - name: Fill
        value: 0
      - name: Line
        value: 1
      - name: Point
        value: 2

  - name: NativeTextureFormat
    doc: |
      Native-specific texture formats.
    entries:
      - name: R16Unorm
        value: 0x00030001
      - name: R16Snorm
        value: 0x00030002
      - name: Rg16Unorm
        value: 0x00030003
      - name: Rg16Snorm
        value: 0x00030004
      - name: Rgba16Unorm
        value: 0x00030005
      - name: Rgba16Snorm
        value: 0x00030006
      - name: NV12
        value: 0x00030007
      - name: P010
        value: 0x00030008

bitflags:
  - name: InstanceBackend
    doc: |
      Bitflags selecting which graphics backends to enable.
    entries:
      - name: All
        value: 0x00000000
      - name: Vulkan
        value: 1
      - name: GL
        value: 2
      - name: Metal
        value: 4
      - name: DX12
        value: 8
      - name: BrowserWebGPU
        value: 32
      - name: Primary
        value_combination: [Vulkan, Metal, DX12, BrowserWebGPU]
      - name: Secondary
        value_combination: [GL]

  - name: InstanceFlag
    doc: |
      Bitflags controlling instance debugging and validation behavior.
    entries:
      - name: Empty
        value: 0x00000000
      - name: Debug
        value: 1
      - name: Validation
        value: 2
      - name: DiscardHalLabels
        value: 4
      - name: AllowUnderlyingNoncompliantAdapter
        value: 8
      - name: GPUBasedValidation
        value: 16
      - name: ValidationIndirectCall
        value: 32
      - name: AutomaticTimestampNormalization
        value: 64
      - name: Default
        value: 0x01000000
      - name: Debugging
        value: 0x02000000
      - name: AdvancedDebugging
        value: 0x04000000
      - name: WithEnv
        value: 0x08000000

typedefs:
  - name: SubmissionIndex
    type: uint64

structs:
  # === Display Handle Structs ===
  - name: XlibDisplayHandle
    members:
      - name: display
        type: c_void
        pointer: mutable
      - name: screen
        type: int32

  - name: XcbDisplayHandle
    members:
      - name: connection
        type: c_void
        pointer: mutable
      - name: screen
        type: int32

  - name: WaylandDisplayHandle
    members:
      - name: display
        type: c_void
        pointer: mutable

  # === Instance & Device Structs ===
  - name: InstanceExtras
    type: extension_in
    members:
      - name: backends
        type: bitflag.InstanceBackend
      - name: flags
        type: bitflag.InstanceFlag
      - name: dx12ShaderCompiler
        type: enum.Dx12Compiler
      - name: gles3MinorVersion
        type: enum.Gles3MinorVersion
      - name: glFenceBehaviour
        type: enum.GLFenceBehaviour
      - name: dxcPath
        type: string
      - name: dxcMaxShaderModel
        type: enum.DxcMaxShaderModel
      - name: dx12PresentationSystem
        type: enum.Dx12SwapchainKind
      - name: budgetForDeviceCreation
        type: uint8
        pointer: immutable
      - name: budgetForDeviceLoss
        type: uint8
        pointer: immutable

  - name: DeviceExtras
    type: extension_in
    members:
      - name: tracePath
        type: string

  - name: NativeLimits
    type: extension_in
    members:
      - name: maxImmediateSize
        type: uint32
      - name: maxNonSamplerBindings
        type: uint32
      - name: maxBindingArrayElementsPerShaderStage
        type: uint32

  # === Pipeline & Shader Structs ===
  - name: PipelineLayoutExtras
    type: extension_in
    members:
      - name: immediateDataSize
        type: uint32

  - name: ShaderDefine
    members:
      - name: name
        type: string
      - name: value
        type: string

  - name: ShaderSourceGLSL
    type: extension_in
    members:
      - name: stage
        type: bitflag.ShaderStage
      - name: code
        type: string
      - name: defineCount
        type: uint32
      - name: defines
        type: struct.ShaderDefine
        pointer: immutable
        array: true

  - name: ShaderModuleDescriptorSpirV
    members:
      - name: label
        type: string
      - name: sourceSize
        type: uint32
      - name: source
        type: uint32
        pointer: immutable
        array: true

  # === Query & Statistics Structs ===
  - name: RegistryReport
    members:
      - name: numAllocated
        type: size_t
      - name: numKeptFromUser
        type: size_t
      - name: numReleasedFromUser
        type: size_t
      - name: elementSize
        type: size_t

  - name: HubReport
    members:
      - name: adapters
        type: struct.RegistryReport
      - name: devices
        type: struct.RegistryReport
      - name: queues
        type: struct.RegistryReport
      - name: pipelineLayouts
        type: struct.RegistryReport
      - name: shaderModules
        type: struct.RegistryReport
      - name: bindGroupLayouts
        type: struct.RegistryReport
      - name: bindGroups
        type: struct.RegistryReport
      - name: commandBuffers
        type: struct.RegistryReport
      - name: renderBundles
        type: struct.RegistryReport
      - name: renderPipelines
        type: struct.RegistryReport
      - name: computePipelines
        type: struct.RegistryReport
      - name: buffers
        type: struct.RegistryReport
      - name: textures
        type: struct.RegistryReport
      - name: textureViews
        type: struct.RegistryReport
      - name: samplers
        type: struct.RegistryReport

  - name: GlobalReport
    members:
      - name: surfaces
        type: struct.RegistryReport
      - name: hub
        type: struct.HubReport

  - name: InstanceEnumerateAdapterOptions
    members:
      - name: nextInChain
        type: struct.ChainedStruct
        pointer: immutable
      - name: backends
        type: bitflag.InstanceBackend

  # === Bind Group Structs ===
  - name: BindGroupEntryExtras
    type: extension_in
    members:
      - name: buffers
        type: object.buffer
        pointer: immutable
        array: true
      - name: bufferCount
        type: size_t
      - name: samplers
        type: object.sampler
        pointer: immutable
        array: true
      - name: samplerCount
        type: size_t
      - name: textureViews
        type: object.texture_view
        pointer: immutable
        array: true
      - name: textureViewCount
        type: size_t

  - name: BindGroupLayoutEntryExtras
    type: extension_in
    members:
      - name: count
        type: uint32

  - name: QuerySetDescriptorExtras
    type: extension_in
    members:
      - name: pipelineStatistics
        type: enum.PipelineStatisticName
        pointer: immutable
        array: true
      - name: pipelineStatisticCount
        type: size_t

  # === Surface Structs ===
  - name: SurfaceConfigurationExtras
    type: extension_in
    members:
      - name: desiredMaximumFrameLatency
        type: uint32

  - name: SurfaceSourceSwapChainPanel
    type: extension_in
    members:
      - name: panelNative
        type: c_void
        pointer: mutable

  # === Primitive State ===
  - name: PrimitiveStateExtras
    type: extension_in
    members:
      - name: polygonMode
        type: enum.PolygonMode
      - name: conservative
        type: bool

constants: []
callbacks: []

functions:
  # === Report & Enumeration ===
  - name: generate_report
    doc: |
      Generate a report of all current objects in the instance.
    args:
      - name: instance
        type: object.instance
      - name: report
        type: struct.GlobalReport
        pointer: mutable
    returns:
      type: void

  - name: instance_enumerate_adapters
    doc: |
      Enumerate adapters available to the instance with options.
    args:
      - name: instance
        type: object.instance
      - name: options
        type: struct.InstanceEnumerateAdapterOptions
        pointer: immutable
        optional: true
      - name: adapters
        type: object.adapter
        pointer: mutable
    returns:
      doc: |
        Number of adapters written to the adapters array.
      type: size_t

  # === Queue Operations ===
  - name: queue_submit_for_index
    doc: |
      Submit commands to the queue and return a submission index.
    args:
      - name: queue
        type: object.queue
      - name: commandCount
        type: size_t
      - name: commands
        type: object.command_buffer
        pointer: immutable
        array: true
    returns:
      doc: |
        A submission index that can be used with device_poll.
      type: typedef.SubmissionIndex

  - name: queue_get_timestamp_period
    doc: |
      Get the timestamp period of the queue in nanoseconds.
    args:
      - name: queue
        type: object.queue
    returns:
      doc: |
        Timestamp period in nanoseconds.
      type: float32

  # === Device Operations ===
  - name: device_poll
    doc: |
      Poll the device for completion of queue submissions.
    args:
      - name: device
        type: object.device
      - name: wait
        type: bool
      - name: submissionIndex
        type: typedef.SubmissionIndex
        pointer: immutable
        optional: true
    returns:
      doc: |
        True if the queue is empty or the submission completed.
      type: bool

  - name: device_create_shader_module_spir_v
    doc: |
      Create a shader module from SPIR-V binary.
    args:
      - name: device
        type: object.device
      - name: descriptor
        type: struct.ShaderModuleDescriptorSpirV
        pointer: immutable
    returns:
      type: object.shader_module

  - name: device_start_graphics_debugger_capture
    doc: |
      Start a graphics debugger capture.
    args:
      - name: device
        type: object.device
    returns:
      doc: |
        True if capture was successfully started.
      type: bool

  - name: device_stop_graphics_debugger_capture
    doc: |
      Stop a graphics debugger capture.
    args:
      - name: device
        type: object.device
    returns:
      type: void

  # === Log Configuration ===
  - name: set_log_callback
    doc: |
      Set a callback for log messages.
    args:
      - name: callback
        type: function_type.log_callback
        optional: true
      - name: userdata
        type: c_void
        pointer: mutable
        optional: true
    returns:
      type: void

  - name: set_log_level
    doc: |
      Set the minimum log level.
    args:
      - name: level
        type: enum.LogLevel
    returns:
      type: void

  - name: get_version
    doc: |
      Get the wgpu-native version.
    returns:
      doc: |
        Version number as an integer.
      type: uint32

  # === Metal Native Handle Getters ===
  - name: device_get_native_metal_device
    doc: |
      Get the native Metal device handle.
    args:
      - name: device
        type: object.device
    returns:
      doc: |
        Opaque pointer to id<MTLDevice>, or NULL.
      type: c_void
      pointer: mutable

  - name: queue_get_native_metal_command_queue
    doc: |
      Get the native Metal command queue handle.
    args:
      - name: queue
        type: object.queue
    returns:
      doc: |
        Opaque pointer to id<MTLCommandQueue>, or NULL.
      type: c_void
      pointer: mutable

  - name: texture_get_native_metal_texture
    doc: |
      Get the native Metal texture handle.
    args:
      - name: texture
        type: object.texture
    returns:
      doc: |
        Opaque pointer to id<MTLTexture>, or NULL.
      type: c_void
      pointer: mutable

  # === Immediate Data ===
  - name: render_pass_encoder_set_immediates
    doc: |
      Set immediate data for a render pass encoder.
    args:
      - name: encoder
        type: object.render_pass_encoder
      - name: offset
        type: uint32
      - name: sizeBytes
        type: uint32
      - name: data
        type: c_void
        pointer: immutable

  - name: compute_pass_encoder_set_immediates
    doc: |
      Set immediate data for a compute pass encoder.
    args:
      - name: encoder
        type: object.compute_pass_encoder
      - name: offset
        type: uint32
      - name: sizeBytes
        type: uint32
      - name: data
        type: c_void
        pointer: immutable

  - name: render_bundle_encoder_set_immediates
    doc: |
      Set immediate data for a render bundle encoder.
    args:
      - name: encoder
        type: object.render_bundle_encoder
      - name: offset
        type: uint32
      - name: sizeBytes
        type: uint32
      - name: data
        type: c_void
        pointer: immutable

  # === Multi Draw Indirect ===
  - name: render_pass_encoder_multi_draw_indirect
    doc: |
      Execute multiple indirect draw calls.
    args:
      - name: encoder
        type: object.render_pass_encoder
      - name: buffer
        type: object.buffer
      - name: offset
        type: uint64
      - name: count
        type: uint32

  - name: render_pass_encoder_multi_draw_indexed_indirect
    doc: |
      Execute multiple indexed indirect draw calls.
    args:
      - name: encoder
        type: object.render_pass_encoder
      - name: buffer
        type: object.buffer
      - name: offset
        type: uint64
      - name: count
        type: uint32

  - name: render_pass_encoder_multi_draw_indirect_count
    doc: |
      Execute multiple indirect draw calls with count from a buffer.
    args:
      - name: encoder
        type: object.render_pass_encoder
      - name: buffer
        type: object.buffer
      - name: offset
        type: uint64
      - name: count_buffer
        type: object.buffer
      - name: count_buffer_offset
        type: uint64
      - name: max_count
        type: uint32

  - name: render_pass_encoder_multi_draw_indexed_indirect_count
    doc: |
      Execute multiple indexed indirect draw calls with count from a buffer.
    args:
      - name: encoder
        type: object.render_pass_encoder
      - name: buffer
        type: object.buffer
      - name: offset
        type: uint64
      - name: count_buffer
        type: object.buffer
      - name: count_buffer_offset
        type: uint64
      - name: max_count
        type: uint32

  # === Pipeline Statistics Query ===
  - name: compute_pass_encoder_begin_pipeline_statistics_query
    doc: |
      Begin a pipeline statistics query in a compute pass.
    args:
      - name: encoder
        type: object.compute_pass_encoder
      - name: querySet
        type: object.query_set
      - name: queryIndex
        type: uint32

  - name: compute_pass_encoder_end_pipeline_statistics_query
    doc: |
      End a pipeline statistics query in a compute pass.
    args:
      - name: encoder
        type: object.compute_pass_encoder

  - name: render_pass_encoder_begin_pipeline_statistics_query
    doc: |
      Begin a pipeline statistics query in a render pass.
    args:
      - name: encoder
        type: object.render_pass_encoder
      - name: querySet
        type: object.query_set
      - name: queryIndex
        type: uint32

  - name: render_pass_encoder_end_pipeline_statistics_query
    doc: |
      End a pipeline statistics query in a render pass.
    args:
      - name: encoder
        type: object.render_pass_encoder

  # === Timestamp Queries ===
  - name: compute_pass_encoder_write_timestamp
    doc: |
      Write a timestamp to a query set in a compute pass.
    args:
      - name: encoder
        type: object.compute_pass_encoder
      - name: querySet
        type: object.query_set
      - name: queryIndex
        type: uint32

  - name: render_pass_encoder_write_timestamp
    doc: |
      Write a timestamp to a query set in a render pass.
    args:
      - name: encoder
        type: object.render_pass_encoder
      - name: querySet
        type: object.query_set
      - name: queryIndex
        type: uint32

function_types:
  - name: log_callback
    args:
      - name: level
        type: enum.LogLevel
      - name: message
        type: string
      - name: userdata
        type: c_void
        pointer: mutable
